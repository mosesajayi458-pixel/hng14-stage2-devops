name: DevOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python lint tools
        run: pip install flake8

      - name: Lint API & Worker
        run: |
          flake8 api
          flake8 worker

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Lint frontend
        run: |
          cd frontend
          npx eslint .

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install API dependencies
        run: |
          pip install -r api/requirements.txt

      - name: Run pytest with coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests --cov=api --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:latest -t localhost:5000/api:${{ github.sha }} ./api

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:latest -t localhost:5000/worker:${{ github.sha }} ./worker

      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:latest -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Push API image
        run: |
          docker push localhost:5000/api:latest
          docker push localhost:5000/api:${{ github.sha }}

      - name: Push Worker image
        run: |
          docker push localhost:5000/worker:latest
          docker push localhost:5000/worker:${{ github.sha }}

      - name: Push Frontend image
        run: |
          docker push localhost:5000/frontend:latest
          docker push localhost:5000/frontend:${{ github.sha }}
  security_scan:
    runs-on: ubuntu-latest
    needs: build

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Scan API image (print output)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/api:latest
          format: table
          severity: CRITICAL
          exit-code: 1

      - name: Scan API image (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 0

      - name: Scan Worker image (print output)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/worker:latest
          format: table
          severity: CRITICAL
          exit-code: 1

      - name: Scan Worker image (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 0

      - name: Scan Frontend image (print output)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/frontend:latest
          format: table
          severity: CRITICAL
          exit-code: 1

      - name: Scan Frontend image (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 0

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"
  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Start stack with Docker Compose
        run: |
          docker compose up -d --build

      - name: Show running containers
        run: |
          docker compose ps

      - name: Submit job and wait for completion
        run: |
          API_URL="http://localhost:8000"

          JOB_ID=$(curl -s -X POST $API_URL/jobs | jq -r '.job_id')
          echo "Job ID: $JOB_ID"

          for i in {1..30}; do
            STATUS=$(curl -s $API_URL/jobs/$JOB_ID | jq -r '.status')
            echo "Status: $STATUS"

            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi

            sleep 2
          done

          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: |
          docker compose down -v
  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start old version (simulate production)
        run: |
          docker compose up -d --build

      - name: Build new API image
        run: |
          docker build -t api:new ./api

      - name: Run new API container
        run: |
          docker run -d --name api_new -p 8001:8000 api:new

      - name: Wait for new API healthcheck (60 seconds max)
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8001/health | grep "ok"; then
              echo "New API is healthy"
              exit 0
            fi
            echo "Waiting for new API..."
            sleep 2
          done

          echo "New API failed healthcheck. Keeping old container running."
          docker logs api_new
          exit 1

      - name: Stop old API container and replace
        run: |
          docker compose stop api
          docker compose rm -f api

      - name: Start updated API container
        run: |
          docker run -d --name api -p 8000:8000 api:new

      - name: Verify API is running
        run: |
          curl -s http://localhost:8000/health

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v || true
          docker stop api_new || true
          docker rm api_new || true