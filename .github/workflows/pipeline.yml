name: DevOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python lint tools
        run: pip install flake8

      - name: Lint API & Worker
        run: |
          flake8 api
          flake8 worker

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend deps
        run: |
          cd frontend
          npm install

      - name: Lint frontend
        run: |
          cd frontend
          npx eslint .

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install API dependencies
        run: |
          pip install -r api/requirements.txt

      - name: Run pytest with coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest tests --cov=api --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -t localhost:5000/api:latest -t localhost:5000/api:${{ github.sha }} ./api

      - name: Build Worker image
        run: |
          docker build -t localhost:5000/worker:latest -t localhost:5000/worker:${{ github.sha }} ./worker

      - name: Build Frontend image
        run: |
          docker build -t localhost:5000/frontend:latest -t localhost:5000/frontend:${{ github.sha }} ./frontend

      - name: Push API image
        run: |
          docker push localhost:5000/api:latest
          docker push localhost:5000/api:${{ github.sha }}

      - name: Push Worker image
        run: |
          docker push localhost:5000/worker:latest
          docker push localhost:5000/worker:${{ github.sha }}

      - name: Push Frontend image
        run: |
          docker push localhost:5000/frontend:latest
          docker push localhost:5000/frontend:${{ github.sha }}
  security_scan:
    runs-on: ubuntu-latest
    needs: build

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-results
          path: "*.sarif"